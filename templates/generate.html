<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LexiLaw — Document Generator</title>
  <meta name="description" content="Generate any legal document instantly — NDAs, contracts, wills, agreements, and more using AI."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #f8f9fc; --bg-secondary: #ffffff;
      --bg-card: rgba(255,255,255,0.85); --bg-glass: rgba(0,0,0,0.02);
      --border-color: rgba(0,0,0,0.08); --text-primary: #1e293b;
      --text-secondary: #475569; --text-muted: #94a3b8;
      --accent-purple: #6366f1; --accent-blue: #3b82f6;
      --accent-emerald: #10b981; --accent-rose: #ef4444;
      --gradient-primary: linear-gradient(135deg, #6366f1, #3b82f6);
      --gradient-emerald: linear-gradient(135deg, #10b981, #3b82f6);
      --shadow-glow: 0 4px 20px rgba(99,102,241,0.12);
      --shadow-soft: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-medium: 0 4px 12px rgba(0,0,0,0.08);
      --input-bg: #f1f5f9; --pre-bg: rgba(0,0,0,0.04);
      --orb1: rgba(16,185,129,0.06); --orb2: rgba(59,130,246,0.04);
      --header-bg: rgba(248,249,252,0.85); --scrollbar-thumb: #cbd5e1;
    }
    [data-theme="dark"] {
      --bg-primary: #0a0e1a; --bg-secondary: #111827;
      --bg-card: rgba(17,24,39,0.7); --bg-glass: rgba(255,255,255,0.03);
      --border-color: rgba(255,255,255,0.06); --text-primary: #f1f5f9;
      --text-secondary: #94a3b8; --text-muted: #64748b;
      --accent-purple: #818cf8; --accent-blue: #60a5fa;
      --accent-emerald: #34d399; --accent-rose: #fb7185;
      --shadow-glow: 0 0 30px rgba(99,102,241,0.15);
      --shadow-soft: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-medium: 0 4px 12px rgba(0,0,0,0.3);
      --input-bg: rgba(0,0,0,0.2); --pre-bg: rgba(0,0,0,0.3);
      --orb1: rgba(34,211,153,0.08); --orb2: rgba(96,165,250,0.06);
      --header-bg: rgba(10,14,26,0.8); --scrollbar-thumb: rgba(100,100,100,0.3);
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
    .animated-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .animated-bg::before { content: ''; position: absolute; width: 600px; height: 600px; background: radial-gradient(circle, var(--orb1) 0%, transparent 70%); top: -100px; left: -100px; animation: float 18s ease-in-out infinite; }
    .animated-bg::after { content: ''; position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, var(--orb2) 0%, transparent 70%); bottom: -100px; right: -100px; animation: float 22s ease-in-out infinite reverse; }
    @keyframes float { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-30px) scale(1.05); } 66% { transform: translate(-20px,20px) scale(0.95); } }
    .app-container { display: flex; height: 100vh; position: relative; z-index: 1; }
    .sidebar { width: 280px; background: var(--bg-secondary); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: transform 0.3s, background 0.3s; z-index: 20; box-shadow: var(--shadow-soft); }
    .sidebar-header { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
    .sidebar-header .logo { font-size: 22px; background: var(--gradient-primary); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
    .sidebar-header .logo-icon { font-size: 28px; }
    .chat-list { flex: 1; overflow-y: auto; padding: 8px; }
    .chat-list::-webkit-scrollbar { width: 4px; } .chat-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
    .chat-item { display: block; width: 100%; text-align: left; padding: 10px 14px; border-radius: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: inherit; }
    .chat-item:hover { background: var(--bg-glass); color: var(--text-primary); }
    .sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border-color); }
    .new-chat-btn { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--gradient-primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; }
    .new-chat-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }
    .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow-y: auto; }
    .header-nav { padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); background: var(--header-bg); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 10; transition: background 0.3s; }
    .nav-tabs { display: flex; gap: 4px; }
    .nav-tab { padding: 8px 20px; border-radius: 10px; border: none; background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s; text-decoration: none; font-family: inherit; }
    .nav-tab:hover { color: var(--text-primary); background: var(--bg-glass); }
    .nav-tab.active { background: var(--gradient-emerald); color: white; box-shadow: 0 4px 15px rgba(16,185,129,0.25); }
    .theme-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-card); cursor: pointer; transition: all 0.3s; font-family: inherit; color: var(--text-secondary); font-size: 13px; font-weight: 500; }
    .theme-toggle:hover { border-color: var(--accent-purple); color: var(--text-primary); }
    .page-content { padding: 32px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
    .page-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; background: var(--gradient-emerald); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .page-subtitle { color: var(--text-secondary); font-size: 15px; margin-bottom: 32px; }
    .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .category-chip { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.3s; text-align: center; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 6px; box-shadow: var(--shadow-soft); }
    .category-chip:hover { border-color: var(--accent-emerald); color: var(--text-primary); transform: translateY(-2px); box-shadow: var(--shadow-medium); }
    .category-chip .chip-icon { font-size: 24px; }
    .gen-form-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: var(--shadow-soft); }
    .gen-form-card label { display: block; font-weight: 600; font-size: 15px; margin-bottom: 12px; }
    .gen-textarea { width: 100%; min-height: 120px; padding: 16px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-primary); font-size: 14px; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.3s; font-family: inherit; }
    .gen-textarea:focus { border-color: var(--accent-emerald); box-shadow: 0 0 0 3px rgba(16,185,129,0.08); }
    .gen-textarea::placeholder { color: var(--text-muted); }
    .gen-submit-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 16px; margin-top: 16px; border-radius: 12px; border: none; background: var(--gradient-emerald); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
    .gen-submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(16,185,129,0.25); }
    .gen-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 28px; animation: fadeIn 0.4s ease; box-shadow: var(--shadow-soft); }
    .result-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .result-header .result-icon { font-size: 32px; } .result-header h2 { font-size: 20px; font-weight: 700; }
    .result-actions { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .download-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; border-radius: 10px; border: none; background: var(--gradient-primary); color: white; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s; font-family: inherit; }
    .download-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-glow); }
    .preview-panel { background: var(--pre-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; max-height: 500px; overflow-y: auto; font-size: 14px; line-height: 1.8; color: var(--text-secondary); }
    .preview-panel::-webkit-scrollbar { width: 6px; } .preview-panel::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 6px; }
    .preview-panel h1, .preview-panel h2, .preview-panel h3 { color: var(--text-primary); margin: 14px 0 8px; }
    .preview-panel h1 { font-size: 20px; } .preview-panel h2 { font-size: 17px; } .preview-panel h3 { font-size: 15px; }
    .preview-panel p { margin-bottom: 10px; } .preview-panel strong { color: var(--accent-emerald); }
    .preview-panel ul, .preview-panel ol { padding-left: 20px; margin-bottom: 10px; }
    .error-msg { color: var(--accent-rose); background: rgba(239,68,68,0.06); padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-top: 16px; }
    .footer-hint { text-align: center; font-size: 11px; color: var(--text-muted); padding: 16px; }
    .footer-hint a { color: var(--accent-purple); text-decoration: none; } .footer-hint a:hover { text-decoration: underline; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .mobile-toggle { display: none; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .mobile-toggle { display: flex; position: fixed; bottom: 24px; left: 16px; z-index: 30; width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-primary); align-items: center; justify-content: center; cursor: pointer; box-shadow: var(--shadow-medium); }
      .category-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
      .page-title { font-size: 24px; }
    }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 15; }
    .sidebar-overlay.active { display: block; }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="app-container">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo-icon">⚖️</span>
        <span class="logo">LexiLaw</span>
      </div>
      <nav class="chat-list" id="chat-list">
        {% for chat in chat_list %}
        <button class="chat-item" onclick="window.location.href='/'" title="{{ chat.title }}">{{ chat.title }}</button>
        {% endfor %}
      </nav>
      <div class="sidebar-footer">
        <button class="new-chat-btn" onclick="window.location.href='/'">
          <i data-lucide="plus" style="width:18px;height:18px"></i> New Conversation
        </button>
      </div>
    </aside>
    <button class="mobile-toggle" id="sidebar-toggle"><i data-lucide="menu" style="width:20px;height:20px"></i></button>

    <main class="main-content">
      <header class="header-nav">
        <div class="nav-tabs">
          <a href="/" class="nav-tab">💬 Chat</a>
          <a href="/predict" class="nav-tab">🔍 Predict</a>
          <a href="/generate" class="nav-tab active">📜 Generate</a>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
          <span id="theme-icon">🌙</span><span id="theme-label">Dark</span>
        </button>
      </header>

      <div class="page-content">
        <h1 class="page-title">📜 Legal Document Generator</h1>
        <p class="page-subtitle">Generate any legal document with AI — just describe what you need in plain language.</p>

        <div class="category-grid">
          <button class="category-chip" onclick="setPrompt('Draft a Non-Disclosure Agreement (NDA)')"><span class="chip-icon">🔒</span>NDA</button>
          <button class="category-chip" onclick="setPrompt('Draft a Lease/Rental Agreement')"><span class="chip-icon">🏠</span>Lease</button>
          <button class="category-chip" onclick="setPrompt('Draft an Employment Agreement')"><span class="chip-icon">💼</span>Employment</button>
          <button class="category-chip" onclick="setPrompt('Draft a Power of Attorney')"><span class="chip-icon">📋</span>Power of Attorney</button>
          <button class="category-chip" onclick="setPrompt('Draft a Last Will and Testament')"><span class="chip-icon">📜</span>Will</button>
          <button class="category-chip" onclick="setPrompt('Draft a Bail Application')"><span class="chip-icon">⚖️</span>Bail Application</button>
          <button class="category-chip" onclick="setPrompt('Draft a Sale Deed')"><span class="chip-icon">🏗️</span>Sale Deed</button>
          <button class="category-chip" onclick="setPrompt('Draft a Legal Notice')"><span class="chip-icon">📧</span>Legal Notice</button>
          <button class="category-chip" onclick="setPrompt('Draft a Partnership Deed')"><span class="chip-icon">🤝</span>Partnership</button>
          <button class="category-chip" onclick="setPrompt('Draft an Affidavit')"><span class="chip-icon">✍️</span>Affidavit</button>
          <button class="category-chip" onclick="setPrompt('Draft a Cease and Desist Letter')"><span class="chip-icon">🛑</span>Cease &amp; Desist</button>
          <button class="category-chip" onclick="setPrompt('Draft a Service Agreement')"><span class="chip-icon">🔧</span>Service Agreement</button>
        </div>

        <div class="gen-form-card">
          <label for="doc-prompt">Describe the document you need</label>
          <textarea id="doc-prompt" class="gen-textarea" placeholder="Example: Draft an NDA between TechCorp (Disclosing Party) and John Smith (Receiving Party) for a software development project. The agreement should be valid for 2 years, with a jurisdiction of Delhi, India."></textarea>
          <button class="gen-submit-btn" id="generate-btn" onclick="generateDocument()">
            <i data-lucide="file-text" style="width:20px;height:20px"></i> Generate Document
          </button>
        </div>

        <div id="error-msg" class="error-msg" style="display:none;"></div>

        <div id="result-section" style="display:none;">
          <div class="result-card">
            <div class="result-header">
              <span class="result-icon">✅</span>
              <div><h2>Document Generated!</h2><p style="color:var(--text-secondary);font-size:13px;margin-top:4px;" id="file-name-display"></p></div>
            </div>
            <div class="result-actions">
              <a id="download-link" href="#" class="download-btn" download>
                <i data-lucide="download" style="width:18px;height:18px"></i> Download .docx
              </a>
            </div>
            <div class="preview-panel" id="preview-panel"></div>
          </div>
        </div>

        <div class="footer-hint">
          Powered by <strong>LexiLaw</strong> · 
          <a href="https://github.com/bshasikiran" target="_blank">GitHub</a> · 
          <a href="mailto:bshasikiran@gmail.com">Contact</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();
    function setTheme(t) { document.documentElement.setAttribute('data-theme', t); localStorage.setItem('lexilaw-theme', t); document.getElementById('theme-icon').textContent = t==='dark'?'☀️':'🌙'; document.getElementById('theme-label').textContent = t==='dark'?'Light':'Dark'; }
    function toggleTheme() { const c = document.documentElement.getAttribute('data-theme')||'light'; setTheme(c==='dark'?'light':'dark'); }
    (function(){ setTheme(localStorage.getItem('lexilaw-theme')||'light'); })();

    const sidebar = document.getElementById('sidebar'), overlay = document.getElementById('sidebar-overlay');
    document.getElementById('sidebar-toggle').addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('active'); });
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('active'); });

    function setPrompt(text) { document.getElementById('doc-prompt').value = text; document.getElementById('doc-prompt').focus(); }

    async function generateDocument() {
      const prompt = document.getElementById('doc-prompt').value.trim();
      if (!prompt) { alert('Please describe the document you need.'); return; }
      const btn = document.getElementById('generate-btn');
      btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Generating...';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('result-section').style.display = 'none';
      try {
        const response = await fetch('/generate_document', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ doc_prompt: prompt }) });
        const data = await response.json();
        if (data.error) { document.getElementById('error-msg').textContent = data.error; document.getElementById('error-msg').style.display = 'block'; return; }
        document.getElementById('download-link').href = data.download_url;
        document.getElementById('download-link').setAttribute('download', data.file_name);
        document.getElementById('file-name-display').textContent = data.file_name;
        if (data.preview) document.getElementById('preview-panel').innerHTML = marked.parse(data.preview);
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        lucide.createIcons();
      } catch (err) { document.getElementById('error-msg').textContent = 'Network error. Please try again.'; document.getElementById('error-msg').style.display = 'block'; }
      finally { btn.disabled = false; btn.innerHTML = '<i data-lucide="file-text" style="width:20px;height:20px"></i> Generate Document'; lucide.createIcons(); }
    }
  </script>
</body>
</html>
